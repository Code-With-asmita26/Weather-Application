<script>
    let store = null;
    let status = null;
    let firstbtn = document.getElementById("b1");
    let secondbtn = document.getElementById("b2");
     let data ;
     secondbtn.addEventListener('click', function(){
        if(store){
     showhourlyForecast(store.list);
     document.getElementById("main").style.display="block";
        }
     });
    async function output(){
        let bad =document.getElementById("bad").value;
        const apiKey ="b452cb9f9330a6e3f54fbdba7c16da5b";
        if(bad===""){
            alert("please enter properly");
            return;
        }
        try{
     const url = `https://api.openweathermap.org/data/2.5/forecast?q=${bad}&appid=${apiKey}&units=metric`;
        const response = await fetch(url);
      data = await response.json();
         store = data;
        console.log(data);
        if (data.cod=='200'){
        secondbtn.style.display="block";
        secondbtn.style.position = "absolute";
        secondbtn.style.left = "50%";
        secondbtn.style.transform = "translate(-50%, -50%)";
         
        document.getElementById("sun").style.display="block";
        document.getElementById("cloud").style.display="block";
        document.getElementById("speed").style.display="block";
        document.getElementById("drop").style.display="block";
        document.getElementById("air").style.display="block";

        document.getElementById("temp-t").innerHTML="<h1>Temperature</h1>";
        document.getElementById("rain-t").innerHTML="<h1>Precipitation</h1>";
        document.getElementById("hmdt-t").innerHTML="<h1>Humidity</h1>";
        document.getElementById("ws-t").innerHTML="<h1>Wind Speed</h1>";
        document.getElementById("ap-t").innerHTML="<h1>Air Pressure</h1>";

     document.getElementById("temp").innerHTML = Math.round(data.list[0].main.temp )+ "°C";
  //   document.getElementById('hmdt').value =data.list[0].main.humidity + "%";
    //let windspeedmph = (data.list[0].wind.speed * 2.237);
     //document.getElementById('ws').value =data.list[0].wind.speed + "m/s";
   //visibility
     let visvalue = data.visibility;
       document.getElementById("best-dot").classList.remove("active");
       document.getElementById("good-dot").classList.remove("active");
       document.getElementById("poor-dot").classList.remove("active");
    if(visvalue >= 10000){
        document.getElementById("best-dot").classList.add("active");
    }
    else if(visvalue >= 5000){
        document.getElementById("good-dot").classList.add("active");
    }
    else{
         document.getElementById("poor-dot").classList.add("active");
    }
    }
    else{
        alert("not found please recheck the spelling");
    }

    //rise-set 
    const apiKey2 =  "7cf9693408e842b38e093347260505";
     const url2 = `https://api.weatherapi.com/v1/forecast.json?key=${apiKey2}&q=${bad}&days=1`;
    const response2 = await fetch(url2);
     const data2 = await response2.json();
     console.log(data2);
    let sunriseT = data2.forecast.forecastday[0].astro.sunrise;
    let sunsetT = data2.forecast.forecastday[0].astro.sunset;
    document.getElementById("Sunrise").innerHTML=sunriseT;
    document.getElementById("Sunset").innerHTML=sunsetT;
    let moonriseT = data2.forecast.forecastday[0].astro.moonrise;
    let moonsetT = data2.forecast.forecastday[0].astro.moonset;
    document.getElementById("moonrise").innerHTML=moonriseT;
    document.getElementById("moonset").innerHTML=moonsetT;
    
    //UV Index
    let uvValue = data2.current.uv;
    let uvstatus = "";
    let uvcolor ="";
    if(uvValue <= 2){
        uvstatus=" UV Effect :<br> low <br> You Are Safe Now \u{1F60A}";
        uvcolor="green";
    }
    else if(uvValue <= 5){
        uvstatus="UV Effect :<br> Moderate <br> You Can Go Now \u{1F3FB}";
        uvcolor="yellow";
    }
    else if(uvValue <= 7){
        uvstatus="UV Effect :<br> High <br> Do Not Forget Your Umbrela And Be Careful \u{2602}\u{FFE0F}";
        uvcolor="orange";
    }
    else if(uvValue <= 10){
        uvstatus="UV Effect :<br> Very high Please Stay At Home \u{1F3E1}";
        uvcolor="red";
    }
    else if(uvValue <= 11){
        uvstatus="UV Effect :<br> Extreem <br> It's Very Harmful For You \u{1F534}";
        uvcolor="vaolate";
    }
    document.getElementById("uv").innerHTML=uvstatus;
     document.getElementById("uv").style.background= uvcolor;
    }
   catch(error){
    console.log(error)
    alert("Try again later");
   }
};

function showhourlyForecast(list){
    const container = document.getElementById("hourly-container");
    container.innerHTML=" ";
    const humidity = document.getElementById("humidity-container");
     humidity.innerHTML=" ";
      const windspeed = document.getElementById("ws-container");
     windspeed.innerHTML=" ";
    const rain =document.getElementById("rain-container");
     rain.innerHTML=" ";
     const pressure =document.getElementById("ap-container");
     pressure.innerHTML=" ";
 //Loop
    list.slice(0,8).forEach(function( hourData){
               //feels like
     const feelslike = Math.round(hourData.main.feels_like);
        document.getElementById("feel").innerHTML = `Feels like: ${feelslike} °C`;

        let iconCode = hourData.weather[0].icon;
        let iconurl = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
        let time=hourData.dt_txt.split(' ')[1].substring(0,5);
        let temp= Math.round(hourData.main.temp);
        let cell = document.createElement("div");
        cell.className="temp-box";
        cell.innerHTML= `<div style="gap: 50px;font-size: 15px; color:white;">${time}</div>
       <img src="${iconurl}"style=" height:60px; width:60px">
        <div style="gap: 50px; font-size: 20px; font-weight:bold;">${temp + "°C"}</div>`;
        container.appendChild(cell);
        let hmdt = Math.round(hourData.main.humidity);
        let hmdtcell = document.createElement("div");
        hmdtcell.className="hmdt-box";
        hmdtcell.innerHTML= `<div style="font-size: 12px; color:white;">${time}</div>
        <div style="font-size: 18px; font-weight:bold;">${hmdt + "%"}</div>`;
        humidity.appendChild(hmdtcell);
        let ws = Math.round(hourData.wind.speed);
        let wscell = document.createElement("div");
        wscell.className="ws-box";
        wscell.innerHTML= `<div style="font-size: 15px; color:white;">${time}</div>
        <img src="ws.png"style=" height:20px; width:20px">
        <div style="font-size: 20px; font-weight:bold;">${ws + "mph"}</div>`;
        windspeed.appendChild(wscell);
        let rainfall = Math.round(hourData.pop*100);
        let raincell = document.createElement("div");
        raincell.className="rain-box";
        raincell.innerHTML=`<div style="font-size: 12px; color:white;">${time}</div>
        <img src="${iconurl}"style=" height:60px; width:60px">
        <div style="font-size: 18px; font-weight:bold;">${rainfall + "%"}</div>`;
        rain.appendChild(raincell);
        let airp = Math.round(hourData.main.pressure);
        let aircell = document.createElement("div");
        aircell.className="air-box";
        aircell.innerHTML = `<div style="font-size: 12px; color:white;">${time}</div>
        <div style="font-size: 18px; font-weight:bold;">${airp + "hPa"}</div>`;
       pressure.appendChild(aircell);   
    });
       }
</script>
